<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romania — Points of Interest</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/markers.css">
</head>
<body>

  <!-- Map -->
  <div id="map"></div>

  <!-- Loading indicator -->
  <div id="loading-status">Loading…</div>

  <!-- Filter Panel (left sidebar) -->
  <div id="filter-panel">
    <div class="filter-header" id="filter-toggle">
      <div class="header-brand">
        <div class="brand-logo">
          <svg viewBox="0 0 36 42" width="36" height="42" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 2L2 10v14c0 10 16 16 16 16s16-6 16-16V10L18 2z"
                  fill="rgba(202,150,14,0.08)" stroke="#CA960E" stroke-width="1.2" stroke-linejoin="round"/>
            <path d="M9 28L14 17L18 22L22 14L27 28H9z"
                  fill="#CA960E" opacity="0.75"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="header-title">ROMANIA</span>
          <span class="header-sub">Points of Interest</span>
        </div>
      </div>
      <button id="filter-toggle-btn" aria-label="Toggle filter panel">
        <svg viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="14">
          <line x1="0" y1="1"  x2="18" y2="1"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="0" y1="7"  x2="18" y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="0" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="filter-body">
      <div class="region-container">
        <label class="region-label" for="region-select">County</label>
        <div class="select-wrapper">
          <select id="region-select">
            <option value="">All Counties</option>
          </select>
          <svg class="select-chevron" viewBox="0 0 10 7" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="filter-actions">
        <button id="toggle-all">Deselect All</button>
      </div>
      <div class="filter-checkboxes"></div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-container">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search attractions…" autocomplete="off">
      <button id="search-clear" aria-label="Clear search">&times;</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- App JS (order matters) -->
  <script src="js/counties.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/markers.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
